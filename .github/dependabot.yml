version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5

  - package-ecosystem: "nuget"
    directory: "/FluxForm.Core"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:10"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5

  - package-ecosystem: "nuget"
    directory: "/FluxForm.CLI"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:20"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5

  - package-ecosystem: "nuget"
    directory: "/FluxForm.WPF"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5

  - package-ecosystem: "nuget"
    directory: "/FluxForm.Tests"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:40"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
