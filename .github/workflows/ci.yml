name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore .\FluxForm.sln

      - name: Build
        run: dotnet build .\FluxForm.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test .\FluxForm.sln --configuration Release --no-build
